name: Diagnose PERSONAL_PROJECT_TOKEN

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe
        env:
          TOKEN: ${{ secrets.PERSONAL_PROJECT_TOKEN }}
        run: |
          set -uo pipefail
          LEN=${#TOKEN}
          echo "Token length: $LEN"
          echo "Token prefix: $(printf '%s' "$TOKEN" | head -c 14)"

          echo
          echo "--- /user ---"
          curl -sS -o /tmp/u.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/user
          head -c 200 /tmp/u.json; echo

          echo
          echo "--- user(Godimas101).projectV2(number: 2) ---"
          BODY='{"query":"{ user(login: \"Godimas101\") { projectV2(number: 2) { id title field(name: \"Status\") { ... on ProjectV2SingleSelectField { id options { id name } } } } } }"}'
          curl -sS -o /tmp/g.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -X POST -d "$BODY" \
            https://api.github.com/graphql
          cat /tmp/g.json; echo
